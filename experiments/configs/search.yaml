sampler:
  type: NSGAIISampler
  population_size: 50
  crossover_prob: 0.9
  swapping_prob: 0.5
  seed: 42

search_space:
  n_res:
    type: int
    low: 50
    high: 1000
  rho:
    type: float
    low: 0.1
    high: 1.5
  sigma:
    type: float
    low: 0.01
    high: 2.0
  sparsity:
    type: float
    low: 0.01
    high: 0.99
  alpha:
    type: float
    low: 0.05
    high: 1.0
  k:
    type: int
    low: 1
    high: 20
  n_wash:
    type: int
    low: 10
    high: 200

optimization:
  n_trials: 1500
  n_jobs: 4
  directions:
    - minimize  # 1 - F1
    - minimize  # n_res / k

multi_sequence:
  sample_size: 10

dataset_overrides:
  WADI:
    k_min: 3
